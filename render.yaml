databases:
  - name: glow-and-grammar-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: glow-and-grammar
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # RENDER_EXTERNAL_URL is injected automatically by Render for every web
    # service — reused here as NEXTAUTH_URL so nothing has to be hardcoded.
    startCommand: >-
      sh -c "export NEXTAUTH_URL=$RENDER_EXTERNAL_URL &&
      npx prisma db push --accept-data-loss --skip-generate &&
      npm run db:seed &&
      npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: glow-and-grammar-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Decrypts stored student passwords for the admin "Показати пароль"
      # view — see src/lib/password-crypto.ts.
      - key: PASSWORD_ENCRYPTION_KEY
        generateValue: true
      # Cloudflare R2 (S3-compatible) — persistent storage for uploaded
      # audio/photos/attachments, since the web service's local disk is
      # wiped on every deploy. Set these manually in the Render dashboard
      # after creating the bucket — see src/lib/storage.ts.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: TEACHER_EMAIL
        value: milena@glowandgrammar.com
      - key: TEACHER_PASSWORD
        value: changeme123
      - key: NODE_ENV
        value: production
